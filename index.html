<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>召喚你的療癒小石｜14題療癒心理測驗</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family:
        "Noto Sans TC",
        "Microsoft JhengHei",
        "PingFang TC",
        "Heiti TC",
        sans-serif;
      background:
        radial-gradient(circle at top, #fff8f1 0%, #f7ecdf 45%, #ead8ca 100%);
      color: #4a3328;
      min-height: 100vh;
    }

    button {
      font-family: inherit;
    }

    .app {
      width: 100%;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 18px 12px 36px;
    }

    .phone-frame {
      width: 100%;
      max-width: 540px;
      min-height: calc(100vh - 36px);
      background: rgba(255, 250, 245, 0.94);
      border-radius: 30px;
      box-shadow: 0 18px 42px rgba(125, 86, 55, 0.24);
      overflow: hidden;
      border: 1px solid rgba(181, 130, 91, 0.24);
      position: relative;
    }

    .hidden {
      display: none !important;
    }

    /* ---------- 封面 ---------- */

    .cover-page {
      min-height: calc(100vh - 36px);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      background: #fff8f1;
    }

    .cover-image {
      width: 100%;
      display: block;
    }

    .cover-content {
      padding: 18px 24px 28px;
      text-align: center;
    }

    .cover-title {
      font-size: 1.4rem;
      font-weight: 900;
      letter-spacing: 0.06em;
      margin: 4px 0 8px;
      color: #805845;
    }

    .cover-subtitle {
      font-size: 1rem;
      line-height: 1.85;
      color: #7b6254;
      margin: 0 auto 20px;
    }

    .start-btn,
    .next-btn,
    .back-btn,
    .restart-btn,
    .share-btn {
      border: none;
      cursor: pointer;
      border-radius: 999px;
      font-size: 1.05rem;
      font-weight: 900;
      letter-spacing: 0.05em;
      padding: 14px 24px;
      transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.15s ease;
    }

    .start-btn,
    .next-btn,
    .restart-btn,
    .share-btn {
      color: white;
      background: linear-gradient(135deg, #d88991, #c47a58);
      box-shadow: 0 8px 18px rgba(170, 92, 80, 0.32);
    }

    .back-btn {
      color: #8a6858;
      background: #f7e9dc;
      box-shadow: 0 5px 12px rgba(145, 103, 72, 0.16);
    }

    .start-btn:hover,
    .next-btn:hover,
    .back-btn:hover,
    .restart-btn:hover,
    .share-btn:hover {
      transform: translateY(-1px);
    }

    .start-btn:disabled,
    .next-btn:disabled,
    .back-btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    /* ---------- 題目頁 ---------- */

    .quiz-page {
      min-height: calc(100vh - 36px);
      background-image:
        linear-gradient(rgba(255, 250, 245, 0.66), rgba(255, 250, 245, 0.78)),
        url("https://imgpoi.com/i/0FWYPE.png");
      background-size: cover;
      background-position: center;
      padding: 22px 18px 24px;
      display: flex;
      flex-direction: column;
    }

    .progress-wrap {
      margin-bottom: 16px;
    }

    .progress-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 9px;
      color: #7b6254;
      font-weight: 800;
      font-size: 0.95rem;
    }

    .progress-bar {
      width: 100%;
      height: 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.8);
      overflow: hidden;
      border: 1px solid rgba(191, 151, 125, 0.28);
    }

    .progress-fill {
      height: 100%;
      width: 7%;
      border-radius: 999px;
      background: linear-gradient(90deg, #e8b6c3, #d69d75);
      transition: width 0.25s ease;
    }

    .question-card {
      background: rgba(255, 252, 248, 0.92);
      border: 1px solid rgba(200, 164, 132, 0.36);
      border-radius: 28px;
      padding: 22px 18px;
      box-shadow: 0 10px 24px rgba(128, 86, 55, 0.16);
      backdrop-filter: blur(2px);
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .question-label {
      color: #bb7a76;
      font-weight: 900;
      font-size: 1rem;
      margin-bottom: 8px;
    }

    .question-title {
      font-size: 1.5rem;
      line-height: 1.45;
      font-weight: 900;
      margin: 0 0 18px;
      color: #4b342a;
    }

    .options {
      display: grid;
      gap: 12px;
      margin-top: 4px;
    }

    .option {
      width: 100%;
      text-align: left;
      border: 2px solid rgba(201, 158, 137, 0.28);
      background: rgba(255, 255, 255, 0.86);
      border-radius: 20px;
      padding: 15px 15px;
      color: #4b342a;
      font-size: 1.06rem;
      line-height: 1.55;
      cursor: pointer;
      transition: transform 0.15s ease, border-color 0.15s ease, background 0.15s ease;
    }

    .option:hover {
      transform: translateY(-1px);
      border-color: rgba(204, 126, 118, 0.55);
      background: rgba(255, 255, 255, 0.96);
    }

    .option.selected {
      border-color: #d4868b;
      background: #fff1f2;
      box-shadow: 0 0 0 4px rgba(212, 134, 139, 0.16);
    }

    .option-prefix {
      display: inline-flex;
      width: 1.8em;
      height: 1.8em;
      align-items: center;
      justify-content: center;
      margin-right: 6px;
      border-radius: 50%;
      background: #f4dfd7;
      color: #8b5f51;
      font-weight: 900;
    }

    .quiz-actions {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-top: 20px;
    }

    .quiz-actions button {
      flex: 1;
    }

    /* ---------- 結果頁 ---------- */

    .result-page {
      min-height: calc(100vh - 36px);
      padding: 20px 16px 28px;
      background:
        linear-gradient(rgba(255, 250, 245, 0.88), rgba(255, 246, 239, 0.96)),
        url("https://imgpoi.com/i/0FWYPE.png");
      background-size: cover;
      background-position: center;
    }

    .result-header {
      text-align: center;
      margin-bottom: 18px;
      background: rgba(255, 255, 255, 0.78);
      border-radius: 24px;
      padding: 18px 14px;
      border: 1px solid rgba(190, 145, 114, 0.28);
      box-shadow: 0 10px 22px rgba(128, 86, 55, 0.12);
    }

    .result-header h1 {
      margin: 0 0 8px;
      font-size: 1.6rem;
      color: #815542;
    }

    .result-header p {
      margin: 0;
      color: #7b6254;
      line-height: 1.75;
      font-size: 0.98rem;
    }

    .result-summary {
      display: grid;
      gap: 12px;
      margin-bottom: 18px;
    }

    .stone-summary {
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.86);
      padding: 14px 16px;
      border: 1px solid rgba(190, 145, 114, 0.28);
      box-shadow: 0 8px 18px rgba(128, 86, 55, 0.12);
    }

    .stone-rank {
      font-size: 0.95rem;
      font-weight: 900;
      color: #c17370;
      margin-bottom: 4px;
    }

    .stone-name {
      font-size: 1.35rem;
      font-weight: 900;
      margin-bottom: 6px;
      color: #4b342a;
    }

    .stone-desc {
      margin: 0;
      font-size: 0.98rem;
      line-height: 1.75;
      color: #765f52;
    }

    .result-image-block {
      background: rgba(255, 255, 255, 0.74);
      border-radius: 24px;
      padding: 12px;
      border: 1px solid rgba(190, 145, 114, 0.26);
      box-shadow: 0 10px 24px rgba(128, 86, 55, 0.15);
      margin-bottom: 16px;
    }

    .result-image-title {
      text-align: center;
      font-weight: 900;
      color: #815542;
      margin: 4px 0 10px;
      font-size: 1.12rem;
      line-height: 1.5;
    }

    .result-image {
      width: 100%;
      display: block;
      border-radius: 18px;
      background: #fff;
    }

    .score-details {
      margin-top: 18px;
      padding: 16px;
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.78);
      border: 1px solid rgba(190, 145, 114, 0.25);
      color: #6a5549;
    }

    .score-details summary {
      cursor: pointer;
      font-weight: 900;
      color: #8a5d4b;
      font-size: 1rem;
    }

    .score-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 12px;
      font-size: 0.92rem;
      overflow: hidden;
      border-radius: 14px;
    }

    .score-table th,
    .score-table td {
      border-bottom: 1px solid rgba(150, 115, 92, 0.18);
      padding: 8px 6px;
      text-align: center;
    }

    .score-table th {
      background: #f5e7da;
      color: #745549;
    }

    .result-actions {
      display: flex;
      gap: 12px;
      margin-top: 16px;
    }

    .result-actions button {
      flex: 1;
    }

    .hint {
      margin-top: 12px;
      font-size: 0.88rem;
      line-height: 1.7;
      color: #8b7060;
      text-align: center;
    }

    @media (max-width: 420px) {
      .app {
        padding: 0;
      }

      .phone-frame {
        border-radius: 0;
        min-height: 100vh;
      }

      .cover-page,
      .quiz-page,
      .result-page {
        min-height: 100vh;
      }

      .question-title {
        font-size: 1.32rem;
      }

      .option {
        font-size: 1rem;
        padding: 13px;
      }

      .result-header h1 {
        font-size: 1.42rem;
      }

      .stone-name {
        font-size: 1.22rem;
      }
    }
  </style>
</head>

<body>
  <main class="app">
    <section class="phone-frame">

      <!-- 封面頁 -->
      <section id="coverPage" class="cover-page">
        <img
          class="cover-image"
          src="https://imgpoi.com/i/0FW4N5.png"
          alt="召喚你的療癒小石封面"
        />

        <div class="cover-content">
          <h1 class="cover-title">準備好召喚你的療癒小石了嗎？</h1>
          <p class="cover-subtitle">
            14題療癒心理測驗，陪你看看最近的身心狀態，<br />
            找到此刻最適合陪伴你的主水晶與次水晶。
          </p>

          <button class="start-btn" type="button" onclick="startQuiz()">
            開始測驗 ✨
          </button>
        </div>
      </section>

      <!-- 題目頁 -->
      <section id="quizPage" class="quiz-page hidden">
        <div class="progress-wrap">
          <div class="progress-top">
            <span id="questionCount">第 1 / 14 題</span>
            <span>召喚中… 🔮</span>
          </div>
          <div class="progress-bar">
            <div id="progressFill" class="progress-fill"></div>
          </div>
        </div>

        <article class="question-card">
          <div id="questionLabel" class="question-label">第1題</div>
          <h2 id="questionTitle" class="question-title"></h2>

          <div id="options" class="options"></div>

          <div class="quiz-actions">
            <button id="backBtn" class="back-btn" type="button" onclick="prevQuestion()">
              上一題
            </button>
            <button id="nextBtn" class="next-btn" type="button" onclick="nextQuestion()" disabled>
              下一題
            </button>
          </div>

          <p class="hint">請選擇最近最像你的狀態，沒有標準答案，直覺就很好 💛</p>
        </article>
      </section>

      <!-- 結果頁 -->
      <section id="resultPage" class="result-page hidden">
        <div class="result-header">
          <h1>你的療癒小石出現了 ✨</h1>
          <p>
            依照你的作答結果，<br />
            以下是最適合陪伴你的<strong>主水晶</strong>與<strong>次水晶</strong>。
          </p>
        </div>

        <div id="resultSummary" class="result-summary"></div>

        <div class="result-image-block">
          <div id="primaryImageTitle" class="result-image-title"></div>
          <img id="primaryResultImage" class="result-image" src="" alt="主水晶結果圖解" />
        </div>

        <div class="result-image-block">
          <div id="secondaryImageTitle" class="result-image-title"></div>
          <img id="secondaryResultImage" class="result-image" src="" alt="次水晶結果圖解" />
        </div>

        <details class="score-details">
          <summary>查看計分明細</summary>
          <table class="score-table">
            <thead>
              <tr>
                <th>療癒小石</th>
                <th>分數</th>
              </tr>
            </thead>
            <tbody id="scoreTableBody"></tbody>
          </table>
        </details>

        <div class="result-actions">
          <button class="back-btn" type="button" onclick="backToLastQuestion()">
            回到題目
          </button>
          <button class="restart-btn" type="button" onclick="restartQuiz()">
            重新測驗
          </button>
        </div>
      </section>

    </section>
  </main>

  <script>
    /*
      代碼說明：
      W = 白水晶
      R = 紅碧玉
      P = 粉晶
      T = 虎眼石
      G = 東菱玉
      A = 紫水晶
      L = 青金石
      O = 黑曜石

      設計原則：
      14題 × 4選項 = 56個選項
      8種療癒小石各出現7次
    */

    const stoneData = {
      W: {

      },

        name: "虎眼石",
        role: "勇氣小隊長",

      },

      }
    };

    const questions = [
      {

      },
      {

        options: [

          { label: "B", text: "希望自己能被溫柔對待 💗", stone: "P" },
          { label: "C", text: "好想有穩穩的力量支撐自己 🌱", stone: "R" },

      },
      {
        title: "當你感覺被消耗時…",
        options: [
          { label: "A", text: "會想做一點讓自己慢慢恢復的事 🍃", stone: "G" },
          { label: "B", text: "會想把事情說清楚，不想再悶著 🔵", stone: "L" },
          { label: "C", text: "會想做一個明確決定，不再卡住 ⚡", stone: "T" },
          { label: "D", text: "會想把不屬於自己的責任放下 🛡", stone: "O" }
        ]
      },
      {
        title: "此刻的你，最想召喚哪一種陪伴？",
        options: [
          { label: "A", text: "幫我整理混亂，讓事情變清楚 ✨", stone: "W" },
          { label: "B", text: "讓我安靜下來，找回內在平靜 💜", stone: "A" },
          { label: "C", text: "給我勇氣，相信自己的選擇 🐯", stone: "T" },
          { label: "D", text: "讓我能真實表達，不再壓抑 🔵", stone: "L" }
        ]
      }
    ];

    let currentQuestionIndex = 0;
    let answers = Array(questions.length).fill(null);

    const coverPage = document.getElementById("coverPage");
    const quizPage = document.getElementById("quizPage");
    const resultPage = document.getElementById("resultPage");

    const questionCount = document.getElementById("questionCount");
    const questionLabel = document.getElementById("questionLabel");
    const questionTitle = document.getElementById("questionTitle");
    const optionsContainer = document.getElementById("options");
    const progressFill = document.getElementById("progressFill");
    const backBtn = document.getElementById("backBtn");
    const nextBtn = document.getElementById("nextBtn");

    function startQuiz() {
      coverPage.classList.add("hidden");
      resultPage.classList.add("hidden");
      quizPage.classList.remove("hidden");
      currentQuestionIndex = 0;
      renderQuestion();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function renderQuestion() {
      const question = questions[currentQuestionIndex];
      const currentAnswer = answers[currentQuestionIndex];

      questionCount.textContent = `第 ${currentQuestionIndex + 1} / ${questions.length} 題`;
      questionLabel.textContent = `第${currentQuestionIndex + 1}題`;
      questionTitle.textContent = question.title;

      const progressPercent = ((currentQuestionIndex + 1) / questions.length) * 100;
      progressFill.style.width = `${progressPercent}%`;

      optionsContainer.innerHTML = "";

      question.options.forEach((option, optionIndex) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "option";

        if (currentAnswer === optionIndex) {
          button.classList.add("selected");
        }

        button.innerHTML = `
          <span class="option-prefix">${option.label}</span>
          ${option.text}
        `;

        button.addEventListener("click", () => {
          answers[currentQuestionIndex] = optionIndex;
          renderQuestion();
        });

        optionsContainer.appendChild(button);
      });

      backBtn.disabled = currentQuestionIndex === 0;
      nextBtn.disabled = answers[currentQuestionIndex] === null;
      nextBtn.textContent =
        currentQuestionIndex === questions.length - 1 ? "查看結果" : "下一題";
    }

    function nextQuestion() {
      if (answers[currentQuestionIndex] === null) return;

      if (currentQuestionIndex < questions.length - 1) {
        currentQuestionIndex++;
        renderQuestion();
        window.scrollTo({ top: 0, behavior: "smooth" });
      } else {
        showResult();
      }
    }

    function prevQuestion() {
      if (currentQuestionIndex > 0) {
        currentQuestionIndex--;
        renderQuestion();
        window.scrollTo({ top: 0, behavior: "smooth" });
      }
    }

    function calculateScores() {
      const scores = {
        W: 0,
        R: 0,
        P: 0,
        T: 0,
        G: 0,
        A: 0,
        L: 0,
        O: 0
      };

      /*
        同分處理規則：
        若分數相同，會以「較後面題目被選到」的小石優先。
        因為後面題目較偏向當下渴望與整合狀態。
      */
      const tieBreaker = {
        W: -1,
        R: -1,
        P: -1,
        T: -1,
        G: -1,
        A: -1,
        L: -1,
        O: -1
      };

      answers.forEach((answerIndex, questionIndex) => {
        const stone = questions[questionIndex].options[answerIndex].stone;
        scores[stone]++;
        tieBreaker[stone] = questionIndex;
      });

      const sorted = Object.keys(scores).sort((a, b) => {
        if (scores[b] !== scores[a]) {
          return scores[b] - scores[a];
        }
        return tieBreaker[b] - tieBreaker[a];
      });

      return {
        scores,
        sorted,
        primary: sorted[0],
        secondary: sorted[1]
      };
    }

    function showResult() {
      const result = calculateScores();

      quizPage.classList.add("hidden");
      coverPage.classList.add("hidden");
      resultPage.classList.remove("hidden");

      renderResultSummary(result.primary, result.secondary);
      renderResultImages(result.primary, result.secondary);
      renderScoreTable(result.scores);

      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function renderResultSummary(primaryCode, secondaryCode) {
      const primary = stoneData[primaryCode];
      const secondary = stoneData[secondaryCode];

      const resultSummary = document.getElementById("resultSummary");

      resultSummary.innerHTML = `
        <div class="stone-summary">
          <div class="stone-rank">🌟 主水晶</div>
          <div class="stone-name">${primary.name}｜${primary.role}</div>
          <p class="stone-desc">${primary.desc}</p>
        </div>

        <div class="stone-summary">
          <div class="stone-rank">⭐ 次水晶</div>
          <div class="stone-name">${secondary.name}｜${secondary.role}</div>
          <p class="stone-desc">${secondary.desc}</p>
        </div>
      `;
    }

    function renderResultImages(primaryCode, secondaryCode) {
      const primary = stoneData[primaryCode];
      const secondary = stoneData[secondaryCode];

      document.getElementById("primaryImageTitle").textContent =
        `🌟 主水晶：${primary.name}｜${primary.role}`;
      document.getElementById("primaryResultImage").src = primary.image;
      document.getElementById("primaryResultImage").alt = `${primary.name}結果圖解`;

      document.getElementById("secondaryImageTitle").textContent =
        `⭐ 次水晶：${secondary.name}｜${secondary.role}`;
      document.getElementById("secondaryResultImage").src = secondary.image;
      document.getElementById("secondaryResultImage").alt = `${secondary.name}結果圖解`;
    }

    function renderScoreTable(scores) {
      const scoreTableBody = document.getElementById("scoreTableBody");

      const rows = Object.keys(stoneData)
        .map(code => ({
          code,
          name: stoneData[code].name,
          role: stoneData[code].role,
          score: scores[code]
        }))
        .sort((a, b) => b.score - a.score);

      scoreTableBody.innerHTML = rows.map(row => `
        <tr>
          <td>${row.name}<br><small>${row.role}</small></td>
          <td>${row.score}</td>
        </tr>
      `).join("");
    }

    function backToLastQuestion() {
      resultPage.classList.add("hidden");
      quizPage.classList.remove("hidden");
      currentQuestionIndex = questions.length - 1;
      renderQuestion();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function restartQuiz() {
      answers = Array(questions.length).fill(null);
      currentQuestionIndex = 0;
      resultPage.classList.add("hidden");
      coverPage.classList.remove("hidden");
      quizPage.classList.add("hidden");
      window.scrollTo({ top: 0, behavior: "smooth" });
    }
  </script>
</body>
</html>
